name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20.18.0
          cache: pnpm

      - name: install
        run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm -r typecheck

      - name: test
        run: pnpm -r test

      - name: build
        run: pnpm -r build
